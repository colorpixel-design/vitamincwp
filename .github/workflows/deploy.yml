name: Deploy to AWS EC2

# Trigger: every push to main branch
on:
  push:
    branches: [main]

# Only one deployment at a time
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Build on GitHub (free) — EC2 t2.micro has only 1GB RAM
  # ────────────────────────────────────────────────────────────
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_REGION: ap-south-1
          AWS_S3_BUCKET: bestcserum-assets
          NEXT_PUBLIC_CDN_URL: ${{ secrets.NEXT_PUBLIC_CDN_URL }}

      # Package the build — includes prisma.config.ts (required by Prisma 7!)
      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            prisma \
            prisma.config.ts \
            next.config.ts \
            tsconfig.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /home/ubuntu/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📦 Extracting build..."
            cd /home/ubuntu
            rm -rf vitaminc-new
            mkdir -p vitaminc-new
            tar -xzf deploy.tar.gz -C vitaminc-new/

            echo "📥 Installing prod dependencies..."
            cd vitaminc-new
            npm ci --omit=dev

            echo "⚙️ Writing .env BEFORE migration..."
            printf 'NODE_ENV=production\nNEXT_PUBLIC_APP_URL=http://localhost:3002\nDATABASE_URL=${{ secrets.DATABASE_URL }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\nAWS_REGION=ap-south-1\nAWS_S3_BUCKET=bestcserum-assets\nNEXT_PUBLIC_CDN_URL=${{ secrets.NEXT_PUBLIC_CDN_URL }}\nPORT=3002\n' > /home/ubuntu/vitaminc-new/.env

            echo "🔑 Exporting DATABASE_URL for Prisma..."
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"

            echo "🔧 Generating Prisma client..."
            npx prisma generate

            echo "🗄️ Running database migrations..."
            npx prisma migrate deploy

            echo "🔄 Swapping deployment..."
            cd /home/ubuntu
            rm -rf vitaminc-old
            [ -d vitaminc ] && mv vitaminc vitaminc-old
            mv vitaminc-new vitaminc

            echo "🔁 Restarting VitaminC app on port 3002..."
            cd /home/ubuntu/vitaminc
            pm2 delete vitaminc 2>/dev/null || true
            PORT=3002 pm2 start npm --name vitaminc -- start
            pm2 save

            echo "🧹 Cleanup..."
            rm -f /home/ubuntu/deploy.tar.gz

            echo "📁 Ensure uploads directory exists..."
            mkdir -p /home/ubuntu/vitaminc-uploads/serums

            echo "🌐 Update nginx to serve uploads..."
            if ! grep -q "vitaminc-uploads" /etc/nginx/sites-available/bestcserum.com; then
              sudo sed -i 's|location / {|location /uploads/ {\n        alias /home/ubuntu/vitaminc-uploads/;\n        expires 30d;\n        add_header Cache-Control "public";\n    }\n\n    location / {|' /etc/nginx/sites-available/bestcserum.com
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "✅ Deployment complete! Running on port 3002"
