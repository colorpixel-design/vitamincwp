services:
  postgres:
    image: postgres:16-alpine
    container_name: vitaminc_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vitaminc
      POSTGRES_PASSWORD: vitaminc_local_pass
      POSTGRES_DB: vitaminc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitaminc -d vitaminc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
